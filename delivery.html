<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>CC生鮮 - 行程表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F9F5EB; color: #1B4F72; font-family: sans-serif; }
    </style>
</head>
<body class="p-4">
    <div id="container" class="max-w-md mx-auto space-y-4"></div>

    <script>
        const GVIZ_URL = 'https://docs.google.com/spreadsheets/d/1bH5pruibJGlt4elKZUMcKRgAWRDraUX8w-A36atC3Js/gviz/tq?tqx=out:json';
        
        fetch(GVIZ_URL)
            .then(res => res.text())
            .then(text => {
                const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
                const container = document.getElementById('container');
                
                json.table.rows.forEach(row => {
                    const routeName = row.c[3]?.v || '';
                    const stopsRaw = row.c[4]?.v || '';
                    
                    // 核心邏輯：自動切割每一站
                    const stops = stopsRaw.split(';').map(s => {
                        const parts = s.split('|');
                        return { name: parts[0]?.trim(), time: parts[1]?.trim() };
                    }).filter(s => s.name);

                    const card = document.createElement('div');
                    card.className = 'bg-white p-5 rounded-2xl shadow-sm border border-orange-100';
                    card.innerHTML = `<h3 class="font-bold text-lg mb-3 border-b pb-2 text-orange-600">${routeName}</h3>` +
                        stops.map(s => `
                            <div class="flex justify-between py-2 border-b border-gray-50 last:border-0">
                                <span class="font-bold text-sm">${s.name}</span>
                                <span class="bg-orange-100 text-orange-700 text-xs px-2 py-1 rounded font-bold">${s.time}</span>
                            </div>
                        `).join('');
                    container.appendChild(card);
                });
            });
    </script>
</body>
</html>
