<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC生鮮 - 線上商城 | 新鮮優質生鮮零售</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F9F5EB; /* 復古米乳色背景 */
            color: #1B4F72; /* 深海藍文字 */
        }
        .brand-orange { color: #E85B24; }
        .bg-brand-orange { background-color: #E85B24; }
        .bg-brand-orange:hover { background-color: #D14A1B; }
        .brand-blue { color: #1B4F72; }
        .bg-brand-blue { background-color: #1B4F72; }
        .border-brand-blue { border-color: #1B4F72; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="text-3xl brand-blue flex items-center font-bold">
                    <i class="fa-solid fa-fish-fins mr-2 brand-blue"></i>
                    <span class="brand-orange">CC</span>生鮮
                </div>
                <span class="hidden md:inline-block bg-brand-blue text-white text-xs px-2 py-1 rounded-full font-medium">線上商城</span>
            </div>

            <button id="mobile-menu-button" class="md:hidden text-2xl brand-blue focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>

            <nav class="hidden md:flex space-x-8 text-lg font-medium">
                <a href="index.html" class="brand-blue hover:text-orange-500 transition">首頁</a>
                <a href="products.html" class="brand-blue hover:text-orange-500 transition">生鮮商品</a>
                <a href="delivery.html" class="brand-blue hover:text-orange-500 transition">交貨據點</a>
            </nav>

            <div class="hidden md:flex items-center space-x-4">
                <a href="https://line.me/ti/p/@cc8888" target="_blank" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-full text-sm font-medium flex items-center shadow-sm transition">
                    <i class="fa-brands fa-line text-lg mr-1.5"></i> LINE 訂購
                </a>
                <div class="relative cursor-pointer p-2" onclick="toggleCart()">
                    <i class="fa-solid fa-basket-shopping text-2xl brand-blue"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-brand-orange text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100 p-4 space-y-4 text-center shadow-lg">
            <a href="index.html" class="block brand-blue font-bold py-2">首頁</a>
            <a href="products.html" class="block brand-blue font-bold py-2">生鮮商品</a>
            <a href="delivery.html" class="block brand-blue font-bold py-2">交貨據點</a>
            <a href="https://line.me/ti/p/@cc8888" target="_blank" class="block bg-green-500 text-white py-2 rounded-lg font-bold">LINE 訂購</a>
            <button onclick="toggleCart()" class="w-full bg-brand-blue text-white py-2 rounded-lg font-bold mt-2">查看個人購物車</button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-5xl font-black brand-blue mb-4">
                <span class="brand-orange">CC生鮮</span> 嚴選食材販售
            </h1>
            <p class="text-lg text-gray-600 font-medium">擁有 1.6 萬成員社團肯定！每日嚴選最頂級、最搶鮮的海鮮與食材，加入購物車即刻試算金額。</p>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mb-10" id="filter-container">
            <button onclick="setFilter('全部')" class="filter-btn active bg-brand-blue text-white px-5 py-2 rounded-full font-bold text-sm transition">全部</button>
            <button onclick="setFilter('季節推薦')" class="filter-btn bg-white text-brand-blue border border-brand-blue hover:bg-blue-50 px-5 py-2 rounded-full font-bold text-sm transition">季節推薦</button>
            <button onclick="setFilter('肉品')" class="filter-btn bg-white text-brand-blue border border-brand-blue hover:bg-blue-50 px-5 py-2 rounded-full font-bold text-sm transition">肉品</button>
            <button onclick="setFilter('海鮮')" class="filter-btn bg-white text-brand-blue border border-brand-blue hover:bg-blue-50 px-5 py-2 rounded-full font-bold text-sm transition">海鮮</button>
            <button onclick="setFilter('冷凍食品')" class="filter-btn bg-white text-brand-blue border border-brand-blue hover:bg-blue-50 px-5 py-2 rounded-full font-bold text-sm transition">冷凍食品</button>
        </div>

        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-12 text-gray-400 font-medium">
                <i class="fa-solid fa-spinner fa-spin mr-2"></i> 新鮮食材載入中，請稍候...
            </div>
        </div>
    </main>

    <footer class="bg-brand-blue text-white py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-y-3">
            <p class="text-lg font-bold"><span class="brand-orange">CC生鮮</span> 定點交貨行動商城</p>
            <p class="text-sm text-blue-200">© 2026 CC生鮮. All Rights Reserved. 在地深耕生鮮海產零售</p>
        </div>
    </footer>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-85 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 p-6 flex flex-col justify-between" style="width: 380px; max-width: 100vw;">
        <div>
            <div class="flex items-center justify-between border-b pb-4 mb-4">
                <h3 class="text-xl font-bold brand-blue"><i class="fa-solid fa-basket-shopping mr-2"></i>個人購物車</h3>
                <button onclick="toggleCart()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div id="cart-items" class="space-y-4 overflow-y-auto max-h-[60vh] text-sm text-gray-500 pr-2">
                目前購物車是空的，快去挑選新鮮食材吧！
            </div>
        </div>
        <div class="border-t pt-4 space-y-3 bg-white">
            <div class="flex justify-between font-bold text-lg brand-blue mb-2">
                <span>預估總計金額：</span>
                <span id="cart-total" class="brand-orange text-xl">NT$ 0</span>
            </div>
            <p class="text-xs text-red-500">💡 溫馨提醒：定點交貨請於約定時間前往據點取貨付款。</p>
            <button onclick="sendOrderToLine()" class="w-full block text-center bg-brand-orange text-white py-3 rounded-lg font-bold hover:bg-opacity-90 transition cursor-pointer">
                發送 LINE 訊息完成預訂
            </button>
        </div>
    </div>

    <div id="buy-modal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black bg-opacity-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl transform translate-y-full sm:translate-y-0 sm:scale-95 transition-transform duration-300 relative">
            <button onclick="closeBuyModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
            <div class="flex space-x-4 border-b pb-4 mb-4">
                <div id="modal-img-container" class="w-24 h-24 flex items-center justify-center rounded-xl overflow-hidden bg-amber-50 border"></div>
                <div class="flex flex-col justify-end">
                    <h4 id="modal-product-name" class="text-xl font-bold brand-blue line-clamp-1">商品名稱</h4>
                    <p id="modal-product-spec" class="text-sm text-gray-500 mt-1">規格：</p>
                    <p id="modal-product-price" class="text-xl font-black brand-orange mt-2">NT$ 0</p>
                </div>
            </div>
            <div class="flex items-center justify-between py-3 mb-6">
                <span class="font-bold brand-blue text-base">購買數量</span>
                <div class="flex items-center space-x-3 bg-gray-50 rounded-xl border border-gray-200 p-1">
                    <button onclick="updateModalQuantity(-1)" class="w-9 h-9 rounded-lg bg-white shadow-sm text-gray-600 font-bold hover:bg-gray-100 flex items-center justify-center text-lg transition">-</button>
                    <span id="modal-quantity" class="font-bold brand-blue w-8 text-center text-lg">1</span>
                    <button onclick="updateModalQuantity(1)" class="w-9 h-9 rounded-lg bg-brand-blue shadow-sm text-white font-bold hover:bg-opacity-90 flex items-center justify-center text-lg transition">+</button>
                </div>
            </div>
            <button id="modal-submit-btn" onclick="submitToCart()" class="w-full bg-brand-orange hover:bg-[#D14A1B] text-white font-bold py-3.5 rounded-xl shadow-lg transition text-center flex items-center justify-center space-x-2">
                <i class="fa-solid fa-cart-plus"></i>
                <span>確認加入購物車</span>
            </button>
        </div>
    </div>

    <script>
        // --- [新增] 訂單關聯功能 ---
        function generateOrderSerial() {
            const now = new Date();
            const d = now.toISOString().slice(2, 10).replace(/-/g, '');
            const t = now.getHours().toString().padStart(2, '0') + now.getMinutes().toString().padStart(2, '0');
            const r = Math.floor(Math.random() * 900) + 100;
            return `CC${d}${t}${r}`;
        }

        function sendOrderToLine() {
            if (cart.length === 0) {
                alert('購物車是空的，請先挑選商品！');
                return;
            }
            const serial = generateOrderSerial();
            let total = 0;
            let msg = `【新訂單通知】\n訂單編號：${serial}\n--------------------\n`;
            cart.forEach(item => {
                msg += `${item.name} x ${item.quantity} (NT$ ${item.price * item.quantity})\n`;
                total += item.price * item.quantity;
            });
            msg += `--------------------\n總計：NT$ ${total}\n\n請協助確認，謝謝！`;
            const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
            window.open(lineUrl, '_blank');
        }
        // --- [新增完畢] ---

        const menuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        menuButton.addEventListener('click', () => { mobileMenu.classList.toggle('hidden'); });

        function toggleSocialFab() {
            const menu = document.getElementById('social-fab-menu');
            const icon = document.getElementById('social-fab-icon');
            if (menu.classList.contains('opacity-0')) {
                menu.classList.remove('opacity-0', 'translate-y-8', 'pointer-events-none');
                menu.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
            } else {
                menu.classList.add('opacity-0', 'translate-y-8', 'pointer-events-none');
                menu.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
                icon.classList.add('fa-chevron-up');
                icon.classList.remove('fa-chevron-down');
            }
        }

        const SPREADSHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdDvjqWwne3ZZC59vHSAr877h6ayU68GFUDjYjhuvCaPcKF2jKakPkYbBpVl-TZWR4Wy3A4nvcI9pm/pub?output=csv';
        let cart = [];
        let allProducts = [];
        let currentFilter = '全部';
        let currentModalProduct = null;
        let currentModalQty = 1;

        document.addEventListener('DOMContentLoaded', () => { fetchProducts(); });

        function setFilter(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.innerText === category) {
                    btn.className = 'filter-btn active bg-brand-blue text-white px-5 py-2 rounded-full font-bold text-sm transition';
                } else {
                    btn.className = 'filter-btn bg-white text-brand-blue border border-brand-blue hover:bg-blue-50 px-5 py-2 rounded-full font-bold text-sm transition';
                }
            });
            renderProducts();
        }

        async function fetchProducts() {
            try {
                const response = await fetch(SPREADSHEET_CSV_URL);
                if (!response.ok) throw new Error('無法讀取試算表資料');
                const csvText = await response.text();
                allProducts = parseCSV(csvText);
                renderProducts();
            } catch (error) {
                console.error(error);
            }
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            return lines.slice(1).map(line => {
                const values = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') { inQuotes = !inQuotes; }
                    else if (char === ',' && !inQuotes) { values.push(current.trim().replace(/^"|"$/g, '')); current = ''; }
                    else { current += char; }
                }
                values.push(current.trim().replace(/^"|"$/g, ''));
                return {
                    visible: values[0] || 'TRUE', id: values[1] || '', name: values[2] || '', price: values[3] || '0', 
                    imgUrl: values[4] || '', spec: values[5] || '', intro: values[6] || '', promoPrice: values[7] || '', 
                    category: values[8] || '', stock: values[9] || '0'
                };
            });
        }

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            let visibleProducts = allProducts.filter(p => p.visible !== 'FALSE' && p.name !== '');
            if (currentFilter !== '全部') visibleProducts = visibleProducts.filter(p => p.category === currentFilter);
            visibleProducts.forEach((product) => {
                const finalPrice = product.promoPrice && product.promoPrice.trim() !== '' ? Number(product.promoPrice) : Number(product.price);
                const prodId = product.id || product.name;
                const specText = product.spec || '依現場為主';
                const productCard = document.createElement('div');
                productCard.className = 'bg-white rounded-3xl p-6 shadow-md border border-orange-100 flex flex-col justify-between hover:shadow-xl transition-all duration-300';
                productCard.innerHTML = `
                    <div>
                        <h3 class="text-2xl font-bold brand-blue mb-2">${product.name}</h3>
                        <p class="text-gray-500 text-sm mb-4">規格：${specText}</p>
                    </div>
                    <div class="flex items-center justify-between pt-4 border-t">
                        <span class="text-2xl font-black brand-orange">NT$ ${finalPrice.toLocaleString()}</span>
                        <button onclick="openBuyModal('${prodId}', '${product.name.replace(/'/g, "\\'")}', ${finalPrice}, '${product.imgUrl}', '${specText}', '')" class="bg-brand-orange text-white font-bold px-5 py-2 rounded-xl text-sm">直接購買</button>
                    </div>
                `;
                container.appendChild(productCard);
            });
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        function openBuyModal(id, name, price, imgUrl, spec, iconClass) {
            currentModalProduct = { id, name, price };
            const cartItem = cart.find(item => item.id === id);
            currentModalQty = cartItem ? cartItem.quantity : 1;
            document.getElementById('modal-product-name').innerText = name;
            document.getElementById('modal-product-spec').innerText = `規格：${spec}`;
            document.getElementById('modal-product-price').innerText = `NT$ ${price.toLocaleString()}`;
            document.getElementById('modal-quantity').innerText = currentModalQty;
            document.getElementById('buy-modal').classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeBuyModal() { document.getElementById('buy-modal').classList.add('opacity-0', 'pointer-events-none'); }

        function updateModalQuantity(delta) { currentModalQty = Math.max(1, currentModalQty + delta); document.getElementById('modal-quantity').innerText = currentModalQty; }

        function submitToCart() {
            if (!currentModalProduct) return;
            const existingItem = cart.find(item => item.id === currentModalProduct.id);
            if (existingItem) existingItem.quantity = currentModalQty;
            else cart.push({ ...currentModalProduct, quantity: currentModalQty });
            updateCartUI();
            closeBuyModal();
            toggleCart();
        }

        function updateQuantity(id, delta) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartCount = document.getElementById('cart-count');
            const cartItems = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');
            let totalCount = 0, totalPrice = 0;
            cartItems.innerHTML = cart.length === 0 ? '目前購物車是空的，快去挑選新鮮食材吧！' : '';
            cart.forEach(item => {
                totalCount += item.quantity;
                totalPrice += item.price * item.quantity;
                const itemEl = document.createElement('div');
                itemEl.className = 'flex justify-between items-center bg-gray-50 p-3 rounded-xl border';
                itemEl.innerHTML = `
                    <span class="font-bold">${item.name}</span>
                    <div class="flex items-center space-x-2">
                        <button onclick="updateQuantity('${item.id}', -1)" class="w-7 h-7 bg-gray-200 rounded">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQuantity('${item.id}', 1)" class="w-7 h-7 bg-gray-200 rounded">+</button>
                    </div>
                `;
                cartItems.appendChild(itemEl);
            });
            cartCount.innerText = totalCount;
            cartTotal.innerText = `NT$ ${totalPrice.toLocaleString()}`;
        }
    </script>
</body>
</html>
